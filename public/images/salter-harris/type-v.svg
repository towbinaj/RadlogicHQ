<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Metaphysis (upper bone) -->
  <path d="M60,10 L140,10 L150,65 L50,65 Z" fill="#3a4a5a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Growth plate / physis — compressed/crushed, shown narrower -->
  <rect x="48" y="65" width="104" height="6" fill="#4a5a6a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Crush damage indicators on physis -->
  <line x1="70" y1="65" x2="72" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <line x1="85" y1="65" x2="86" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <line x1="100" y1="65" x2="100" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <line x1="115" y1="65" x2="114" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <line x1="130" y1="65" x2="128" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <!-- Epiphysis (lower rounded bone) -->
  <path d="M48,71 L152,71 L155,100 Q155,140 100,140 Q45,140 45,100 Z" fill="#3a4a5a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Compression arrows pointing down onto physis -->
  <g stroke="#f87171" stroke-width="2" fill="#f87171">
    <!-- Left arrow -->
    <line x1="75" y1="2" x2="75" y2="58"/>
    <polygon points="75,62 70,54 80,54"/>
    <!-- Right arrow -->
    <line x1="125" y1="2" x2="125" y2="58"/>
    <polygon points="125,62 120,54 130,54"/>
  </g>
  <!-- Upward arrows from below -->
  <g stroke="#f87171" stroke-width="2" fill="#f87171">
    <line x1="75" y1="148" x2="75" y2="80"/>
    <polygon points="75,76 70,84 80,84"/>
    <line x1="125" y1="148" x2="125" y2="80"/>
    <polygon points="125,76 120,84 130,84"/>
  </g>
  <!-- Label -->
  <text x="100" y="12" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10" font-weight="bold">Type V</text>
</svg>
