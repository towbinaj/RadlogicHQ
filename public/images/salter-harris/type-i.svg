<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Metaphysis (upper bone) -->
  <path d="M60,10 L140,10 L150,65 L50,65 Z" fill="#3a4a5a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Growth plate / physis -->
  <rect x="48" y="65" width="104" height="10" fill="#4a5a6a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Epiphysis (lower rounded bone) -->
  <path d="M48,75 L152,75 L155,100 Q155,140 100,140 Q45,140 45,100 Z" fill="#3a4a5a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Fracture line — horizontal through physis -->
  <line x1="38" y1="70" x2="162" y2="70" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="100" y="12" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10" font-weight="bold">Type I</text>
</svg>
