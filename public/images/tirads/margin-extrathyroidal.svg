<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Thyroid boundary line -->
  <line x1="30" y1="110" x2="170" y2="110" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- Nodule extending beyond boundary -->
  <ellipse cx="100" cy="85" rx="45" ry="42" fill="#3a4a5a" stroke="#60a5fa" stroke-width="2.5"/>
  <!-- Highlight the extension below the line -->
  <line x1="30" y1="110" x2="170" y2="110" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
</svg>
