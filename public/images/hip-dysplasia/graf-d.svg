<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type D: Decentering, femoral head starting to displace (alpha 43-49°) -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - flat, everted cartilage -->
  <path d="M100,40 Q96,46 95,72" stroke="#f87171" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof - everted/pushed outward -->
  <path d="M100,40 Q118,44 132,56" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- Femoral head - decentering, shifting laterally -->
  <circle cx="114" cy="72" r="25" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="114" cy="72" r="25" fill="none" stroke="#f87171" stroke-width="2"/>
  <!-- Displacement arrow -->
  <line x1="100" y1="72" x2="112" y2="68" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="112,68 108,72 110,66" fill="#f87171"/>
  <!-- Alpha angle line -->
  <line x1="100" y1="40" x2="90" y2="72" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Alpha angle arc -->
  <path d="M92,40 A8,8 0 0,0 90,45" stroke="#f87171" stroke-width="1.5" fill="none"/>
  <!-- Labels -->
  <text x="68" y="35" fill="#f87171" font-size="10" font-family="sans-serif">α 43-49°</text>
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">Type D — Decentering</text>
</svg>