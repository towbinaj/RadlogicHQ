<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type IIa−: Deficient for age (alpha 50-59°, age >3 months) -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - moderately deficient -->
  <path d="M100,40 Q90,50 88,80" stroke="#f87171" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof -->
  <path d="M100,40 Q112,48 120,65" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- Femoral head - slightly less covered -->
  <circle cx="104" cy="77" r="25" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="104" cy="77" r="25" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Alpha angle line -->
  <line x1="100" y1="40" x2="83" y2="80" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Alpha angle arc -->
  <path d="M90,40 A10,10 0 0,0 86,47" stroke="#f87171" stroke-width="1.5" fill="none"/>
  <!-- Labels -->
  <text x="68" y="35" fill="#f87171" font-size="10" font-family="sans-serif">α 50-59°</text>
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">Type IIa− — Deficient for Age</text>
</svg>