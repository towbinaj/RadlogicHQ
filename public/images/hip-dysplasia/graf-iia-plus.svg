<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type IIa+: Adequate for age, slightly deficient roof (alpha 50-59°) -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - slightly less steep -->
  <path d="M100,40 Q88,52 85,82" stroke="#60a5fa" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof -->
  <path d="M100,40 Q112,50 118,68" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- Femoral head - mostly covered -->
  <circle cx="102" cy="78" r="25" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="102" cy="78" r="25" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Alpha angle line (slightly less steep) -->
  <line x1="100" y1="40" x2="80" y2="82" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Alpha angle arc -->
  <path d="M90,40 A10,10 0 0,0 85,48" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <!-- Labels -->
  <text x="72" y="35" fill="#60a5fa" font-size="10" font-family="sans-serif">α 50-59°</text>
  <text x="100" y="145" fill="#60a5fa" font-size="11" font-family="sans-serif" text-anchor="middle">Type IIa+ — Adequate for Age</text>
</svg>