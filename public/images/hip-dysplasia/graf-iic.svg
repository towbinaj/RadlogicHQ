<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type IIc: Critical, nearly flat roof (alpha 43-49°) -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - nearly flat, critical -->
  <path d="M100,40 Q95,46 94,75" stroke="#f87171" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof - still wrapping -->
  <path d="M100,40 Q116,46 126,60" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- Femoral head - poorly covered, starting to shift -->
  <circle cx="108" cy="74" r="25" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="108" cy="74" r="25" fill="none" stroke="#f87171" stroke-width="2"/>
  <!-- Alpha angle line - shallow -->
  <line x1="100" y1="40" x2="89" y2="75" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Beta angle line -->
  <line x1="100" y1="40" x2="126" y2="60" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <!-- Alpha angle arc -->
  <path d="M90,40 A10,10 0 0,0 88,45" stroke="#f87171" stroke-width="1.5" fill="none"/>
  <!-- Labels -->
  <text x="68" y="35" fill="#f87171" font-size="10" font-family="sans-serif">α 43-49°</text>
  <text x="130" y="55" fill="#60a5fa" font-size="9" font-family="sans-serif">β</text>
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">Type IIc — Critical</text>
</svg>