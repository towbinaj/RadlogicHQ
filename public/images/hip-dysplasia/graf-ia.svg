<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type Ia: Good bony roof, femoral head well covered, alpha ≥60° -->
  <!-- Ilium (flat bone at top) -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - steep, good coverage -->
  <path d="M100,40 Q85,55 80,85" stroke="#60a5fa" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof -->
  <path d="M100,40 Q110,50 115,65" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- Femoral head - well seated -->
  <circle cx="100" cy="80" r="25" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="100" cy="80" r="25" fill="#3a4a5a" opacity="0.5"/>
  <!-- Alpha angle line (baseline to bony roof) -->
  <line x1="100" y1="40" x2="75" y2="83" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Baseline along ilium -->
  <line x1="60" y1="40" x2="140" y2="40" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <!-- Alpha angle arc -->
  <path d="M88,40 A12,12 0 0,0 82,50" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <!-- Labels -->
  <text x="72" y="35" fill="#60a5fa" font-size="10" font-family="sans-serif">α ≥60°</text>
  <text x="100" y="145" fill="#60a5fa" font-size="11" font-family="sans-serif" text-anchor="middle">Type Ia — Normal</text>
</svg>