<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type IV: Complete dislocation, femoral head fully displaced -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - completely flat -->
  <path d="M100,40 Q99,43 98,62" stroke="#f87171" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof - interposed inferiorly (pushed down into acetabulum) -->
  <path d="M100,40 Q108,42 112,44" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
  <path d="M98,62 Q100,72 106,78 Q110,82 108,88" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
  <!-- Empty acetabulum - cartilage fills it -->
  <path d="M98,62 Q99,78 107,86" stroke="#3a4a5a" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Femoral head - completely dislocated, superior and lateral -->
  <circle cx="140" cy="45" r="23" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="140" cy="45" r="23" fill="none" stroke="#f87171" stroke-width="2.5"/>
  <!-- Displacement arrow -->
  <line x1="108" y1="75" x2="125" y2="55" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="125,55 120,58 123,52" fill="#f87171"/>
  <!-- Labels -->
  <text x="148" y="80" fill="#f87171" font-size="9" font-family="sans-serif">dislocated</text>
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">Type IV — Complete Dislocation</text>
</svg>