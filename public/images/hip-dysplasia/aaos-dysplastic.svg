<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- AAOS Dysplastic: shallow acetabulum, AP pelvis view -->
  <!-- Pelvis outline -->
  <path d="M30,30 Q60,20 100,25 Q140,20 170,30" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Iliac wings -->
  <path d="M30,30 Q35,50 45,65" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <path d="M170,30 Q165,50 155,65" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Normal acetabulum (left, reference) -->
  <path d="M45,65 Q55,60 65,65 Q75,80 72,95" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <!-- Shallow acetabulum (right, dysplastic) -->
  <path d="M155,65 Q148,62 140,64 Q132,70 130,85" stroke="#f87171" stroke-width="2.5" fill="none"/>
  <!-- Normal femoral head (left) -->
  <circle cx="68" cy="78" r="18" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="68" cy="78" r="18" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Dysplastic side - femoral head seated but uncovered -->
  <circle cx="135" cy="75" r="18" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="135" cy="75" r="18" fill="none" stroke="#f87171" stroke-width="2"/>
  <!-- Femoral necks -->
  <line x1="55" y1="93" x2="42" y2="120" stroke="#60a5fa" stroke-width="2"/>
  <line x1="148" y1="90" x2="160" y2="118" stroke="#f87171" stroke-width="2"/>
  <!-- Shallow roof indicator -->
  <path d="M125,60 L150,60" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="152" y="58" fill="#f87171" font-size="8" font-family="sans-serif">shallow</text>
  <!-- Labels -->
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">AAOS — Dysplastic</text>
</svg>