<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- AAOS Dislocated: fully out of acetabulum, AP pelvis view -->
  <!-- Pelvis outline -->
  <path d="M30,30 Q60,20 100,25 Q140,20 170,30" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Iliac wings -->
  <path d="M30,30 Q35,50 45,65" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <path d="M170,30 Q165,50 155,65" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Normal acetabulum (left) -->
  <path d="M45,65 Q55,60 65,65 Q75,80 72,95" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <!-- Empty acetabulum (right) -->
  <path d="M155,65 Q148,62 142,63 Q134,68 132,82" stroke="#f87171" stroke-width="2.5" fill="none"/>
  <!-- Normal femoral head (left) -->
  <circle cx="68" cy="78" r="18" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="68" cy="78" r="18" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Dislocated femoral head (right) - fully superior -->
  <circle cx="150" cy="45" r="17" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="150" cy="45" r="17" fill="none" stroke="#f87171" stroke-width="2.5"/>
  <!-- Femoral necks -->
  <line x1="55" y1="93" x2="42" y2="120" stroke="#60a5fa" stroke-width="2"/>
  <line x1="158" y1="60" x2="168" y2="100" stroke="#f87171" stroke-width="2"/>
  <!-- Displacement arrow -->
  <line x1="140" y1="82" x2="145" y2="60" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="145,60 141,65 147,63" fill="#f87171"/>
  <!-- Empty socket indicator -->
  <text x="126" y="78" fill="#f87171" font-size="8" font-family="sans-serif">empty</text>
  <!-- Labels -->
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">AAOS — Dislocated</text>
</svg>