<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Graf Type IIIb: Eccentric with structural cartilage changes (alpha <43°) -->
  <!-- Ilium -->
  <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4a5a" stroke-width="4"/>
  <!-- Acetabular roof - very flat -->
  <path d="M100,40 Q98,44 97,65" stroke="#f87171" stroke-width="3" fill="none"/>
  <!-- Cartilaginous roof - structurally changed (irregular) -->
  <path d="M100,40 Q118,42 130,46 Q138,50 140,56" stroke="#f87171" stroke-width="2.5" fill="none" stroke-dasharray="3,2"/>
  <!-- Structural change marker (thickened/irregular cartilage) -->
  <path d="M130,46 Q134,52 128,55" stroke="#f87171" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Empty acetabulum -->
  <path d="M97,65 Q98,80 106,86" stroke="#3a4a5a" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Femoral head - displaced superolaterally -->
  <circle cx="128" cy="56" r="24" fill="#3a4a5a" opacity="0.5"/>
  <circle cx="128" cy="56" r="24" fill="none" stroke="#f87171" stroke-width="2"/>
  <!-- Alpha angle line -->
  <line x1="100" y1="40" x2="94" y2="65" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Labels -->
  <text x="68" y="35" fill="#f87171" font-size="10" font-family="sans-serif">α &lt;43°</text>
  <text x="148" y="60" fill="#f87171" font-size="8" font-family="sans-serif">structural</text>
  <text x="148" y="70" fill="#f87171" font-size="8" font-family="sans-serif">changes</text>
  <text x="100" y="145" fill="#f87171" font-size="11" font-family="sans-serif" text-anchor="middle">Type IIIb — Structural Changes</text>
</svg>