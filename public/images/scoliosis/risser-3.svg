<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Risser Stage 3: 50-75% ossification -->
  <!-- Iliac crest bone -->
  <path d="M30,90 Q60,40 100,30 Q140,40 170,90" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Inner iliac surface -->
  <path d="M40,95 Q65,55 100,45 Q135,55 160,95" stroke="#3a4a5a" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Apophysis - 75% filled from lateral side -->
  <path d="M170,90 Q155,55 135,40 Q118,32 100,30 Q82,33 65,40 L68,48 Q82,40 103,40 Q120,40 138,48 Q155,60 168,88 Z" fill="#60a5fa" opacity="0.6"/>
  <path d="M170,90 Q155,55 135,40 Q118,32 100,30 Q82,33 65,40" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <!-- Unfilled apophysis region -->
  <path d="M65,40 Q50,48 40,60 Q34,75 30,90" stroke="#60a5fa" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity="0.3"/>
  <!-- Quadrant markers -->
  <line x1="135" y1="38" x2="135" y2="48" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="28" x2="100" y2="42" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="38" x2="65" y2="50" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
  <!-- Lateral/Medial labels -->
  <text x="170" y="105" fill="#60a5fa" font-size="8" font-family="sans-serif" text-anchor="end">Lateral</text>
  <text x="30" y="105" fill="#60a5fa" font-size="8" font-family="sans-serif">Medial</text>
  <!-- Stage label -->
  <text x="100" y="125" fill="#60a5fa" font-size="10" font-family="sans-serif" text-anchor="middle">50-75% ossification</text>
  <text x="100" y="145" fill="#60a5fa" font-size="11" font-family="sans-serif" text-anchor="middle">Risser 3 — Three Quarters</text>
</svg>