<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Risser Stage 5: Complete fusion of apophysis to ilium -->
  <!-- Iliac crest bone with fused apophysis (single solid structure) -->
  <path d="M30,90 Q60,40 100,30 Q140,40 170,90" stroke="#3a4a5a" stroke-width="3" fill="none"/>
  <!-- Inner iliac surface -->
  <path d="M40,95 Q65,55 100,45 Q135,55 160,95" stroke="#3a4a5a" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Apophysis - fully fused (solid, no gap) -->
  <path d="M170,90 Q155,55 135,40 Q118,32 100,30 Q82,33 65,40 Q48,50 38,68 Q33,80 30,90 L35,87 Q40,72 50,56 Q62,44 68,48 Q82,40 103,40 Q120,40 138,48 Q155,60 168,88 Z" fill="#60a5fa" opacity="0.6"/>
  <path d="M170,90 Q155,55 135,40 Q118,32 100,30 Q82,33 65,40 Q48,50 38,68 Q33,80 30,90" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <!-- Fused - solid inner line (no gap, no dashes) -->
  <path d="M35,87 Q40,72 50,56 Q62,44 80,37 Q100,32 120,37 Q140,44 152,56 Q162,72 168,88" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- "Fused" indicator -->
  <line x1="118" y1="32" x2="130" y2="18" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="132" y="17" fill="#60a5fa" font-size="8" font-family="sans-serif">fused</text>
  <!-- Lateral/Medial labels -->
  <text x="170" y="105" fill="#60a5fa" font-size="8" font-family="sans-serif" text-anchor="end">Lateral</text>
  <text x="30" y="105" fill="#60a5fa" font-size="8" font-family="sans-serif">Medial</text>
  <!-- Stage label -->
  <text x="100" y="125" fill="#60a5fa" font-size="10" font-family="sans-serif" text-anchor="middle">Complete fusion</text>
  <text x="100" y="145" fill="#60a5fa" font-size="11" font-family="sans-serif" text-anchor="middle">Risser 5 — Fused</text>
</svg>