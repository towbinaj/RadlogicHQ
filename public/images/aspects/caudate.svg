<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Brain outline -->
  <ellipse cx="100" cy="75" rx="80" ry="60" fill="#3a4a5a" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Midline -->
  <line x1="100" y1="15" x2="100" y2="135" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <!-- Falx notch -->
  <line x1="90" y1="15" x2="100" y2="20" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="15" x2="100" y2="20" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <!-- Caudate (C) — small region near midline, anterior, LEFT hemisphere (right side of image) -->
  <ellipse cx="112" cy="58" rx="8" ry="12" fill="#f87171" opacity="0.4"/>
</svg>
