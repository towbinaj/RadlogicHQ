<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASPECTS Calculator | RadioLogicHQ</title>
  <meta name="description" content="ASPECTS — Alberta Stroke Program Early CT Score for MCA territory ischemia with structured report output.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo">RadioLogicHQ</a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">ASPECTS</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>ASPECTS <a href="https://doi.org/10.1016/S0140-6736(00)02237-6" target="_blank" rel="noopener" class="tool-hero__ref" title="Barber PA et al. Validity and reliability of a quantitative computed tomography score in predicting outcome of hyperacute stroke before thrombolytic therapy. Lancet 2000.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">ASPECTS</span>
          <span class="summary-badge__value" id="badge-score" data-level="0">10</span>
        </div>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text to auto-fill..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./aspects.js"></script>
</body>
</html>
