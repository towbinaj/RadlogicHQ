<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TI-RADS Calculator | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="TI-RADS thyroid nodule risk stratification calculator with structured report output for PowerScribe and RadAI.">
  <link rel="canonical" href="https://radiologichq.com/src/tools/tirads/tirads.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="RadioLogicHQ">
  <meta property="og:title" content="TI-RADS Calculator | RadioLogicHQ">
  <meta property="og:description" content="TI-RADS thyroid nodule risk stratification calculator with structured report output for PowerScribe and RadAI.">
  <meta property="og:url" content="https://radiologichq.com/src/tools/tirads/tirads.html">
  <meta property="og:image" content="https://radiologichq.com/favicon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="TI-RADS Calculator | RadioLogicHQ">
  <meta name="twitter:description" content="TI-RADS thyroid nodule risk stratification calculator with structured report output for PowerScribe and RadAI.">
  <meta name="twitter:image" content="https://radiologichq.com/favicon-512.png">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="172px" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">TI-RADS</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>TI-RADS <a href="https://www.jacr.org/article/s1546-1440(17)30186-2/fulltext" target="_blank" rel="noopener" class="tool-hero__ref" title="Tessler FN, et al. ACR Thyroid Imaging, Reporting and Data System (TI-RADS): White Paper of the ACR TI-RADS Committee. J Am Coll Radiol. 2017;14(5):587-595.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge">
          <span class="summary-badge__label">Score</span>
          <span class="summary-badge__value" id="total-score">0</span>
        </div>
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Level</span>
          <span class="summary-badge__value" id="tirads-level" data-level="0">--</span>
        </div>
      </div>
    </div>

    <div class="nodule-tabs-bar" id="nodule-tabs">
      <!-- Nodule tabs rendered by tirads.js -->
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="tool-input">
          <!-- Per-nodule form sections rendered by renderer.js -->
        </div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./tirads.js"></script>
</body>
</html>
