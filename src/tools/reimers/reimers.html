<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimers' Index Calculator | RadioLogicHQ</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Reimers' migration index — proximal femoral migration percentage calculator with structured report output.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white.png" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">Reimers' Index</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>Reimers' Index <a href="https://doi.org/10.3109/17453678008990819" target="_blank" rel="noopener" class="tool-hero__ref" title="Reimers J. The stability of the hip in children. Acta Orthop Scand 1980;51(1-6):601-610.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Right</span>
          <span class="summary-badge__value" id="reimers-right">--</span>
        </div>
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Left</span>
          <span class="summary-badge__value" id="reimers-left">--</span>
        </div>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Other Findings</label>
          <textarea id="additional-findings" rows="2" placeholder="None."></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./reimers.js"></script>
</body>
</html>
