<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leg Length Calculator | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Lower extremity length discrepancy measurement with alignment and physeal status for structured report output.">
  <link rel="canonical" href="https://radiologichq.com/src/tools/leglength/leglength.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="RadioLogicHQ">
  <meta property="og:title" content="Leg Length Calculator | RadioLogicHQ">
  <meta property="og:description" content="Lower extremity length discrepancy measurement with alignment and physeal status for structured report output.">
  <meta property="og:url" content="https://radiologichq.com/src/tools/leglength/leglength.html">
  <meta property="og:image" content="https://radiologichq.com/favicon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Leg Length Calculator | RadioLogicHQ">
  <meta name="twitter:description" content="Lower extremity length discrepancy measurement with alignment and physeal status for structured report output.">
  <meta name="twitter:image" content="https://radiologichq.com/favicon-512.png">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="172px" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">Leg Length</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>Leg Length</h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Discrepancy</span>
          <span class="summary-badge__value" id="ll-discrepancy">--</span>
        </div>
      </div>
    </div>

    <div class="mode-tabs-bar" id="mode-tabs"></div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Other Findings</label>
          <textarea id="additional-findings" rows="2" placeholder="None."></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./leglength.js"></script>
</body>
</html>
