<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAH Grading | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Subarachnoid hemorrhage grading — Hunt-Hess clinical scale and Modified Fisher CT scale with structured report output.">
</head>
<body>
  <header class="site-header"><div class="container"><a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="42px" alt="RadioLogic HQ" class="site-header__wordmark"></a><nav class="site-header__nav"><a href="/">All Tools</a><auth-ui></auth-ui></nav></div></header>
  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">SAH Grading</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text"><h1>SAH Grading</h1></div>
      <div class="tool-hero__summary">
        <div class="summary-badge"><span class="summary-badge__label">Hunt-Hess</span><span class="summary-badge__value" id="badge-hh">--</span></div>
        <div class="summary-badge"><span class="summary-badge__label">Mod. Fisher</span><span class="summary-badge__value" id="badge-mf">--</span></div>
      </div>
    </div>
    <div class="tool-layout">
      <div class="tool-layout__input"><div id="step-container"></div><div class="study-findings card"><label for="additional-findings">Additional Findings</label><textarea id="additional-findings" rows="2"></textarea></div></div>
      <div class="tool-layout__output"><report-output></report-output><div class="parse-panel card"><label for="parse-input">Paste Findings</label><textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea><div class="parse-panel__actions"><button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button><span class="parse-panel__status" id="parse-status"></span></div></div></div>
    </div>
  </main>
  <script type="module" src="./sah-grade.js"></script>
</body>
</html>
