<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LI-RADS Calculator | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="LI-RADS v2018 CT/MRI liver observation categorization with structured report output for PowerScribe and RadAI.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="42px" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">LI-RADS</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>LI-RADS <a href="https://edge.sitecorecloud.io/americancoldf5f-acrorgf92a-productioncb02-3650/media/ACR/Files/RADS/LI-RADS/LI-RADS-CT-MRI-2018-Core.pdf" target="_blank" rel="noopener" class="tool-hero__ref" title="ACR LI-RADS v2018 CT/MRI Core">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Category</span>
          <span class="summary-badge__value" id="lirads-category" data-level="0">--</span>
        </div>
      </div>
    </div>

    <div class="observation-tabs-bar" id="obs-tabs"></div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container">
          <!-- Steps rendered by lirads.js -->
        </div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./lirads.js"></script>
</body>
</html>
