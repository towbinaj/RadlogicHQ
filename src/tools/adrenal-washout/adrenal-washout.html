<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrenal Washout Calculator | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Adrenal washout calculator — absolute and relative washout percentages for adrenal lesion characterization.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="42px" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">Adrenal Washout</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>Adrenal Washout <a href="https://doi.org/10.1148/radiol.2223010766" target="_blank" rel="noopener" class="tool-hero__ref" title="Caoili EM et al. Adrenal Masses: Characterization with Combined Unenhanced and Delayed Enhanced CT. Radiology 2002;222(3):629-633.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Absolute</span>
          <span class="summary-badge__value" id="aw-absolute">--</span>
        </div>
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Relative</span>
          <span class="summary-badge__value" id="aw-relative">--</span>
        </div>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./adrenal-washout.js"></script>
</body>
</html>
