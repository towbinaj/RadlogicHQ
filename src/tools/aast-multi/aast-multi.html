<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAST Multi-Trauma | RadioLogicHQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Combined AAST 2018 multi-organ trauma grading — liver, spleen, kidney, and pancreas on one page with unified report output.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white-400.png" srcset="/brand/wordmark-white-400.png 400w, /brand/wordmark-white-800.png 800w, /brand/wordmark-white-1200.png 1200w" sizes="172px" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">AAST Multi-Trauma</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>AAST Multi-Trauma <a href="https://doi.org/10.1097/TA.0000000000002058" target="_blank" rel="noopener" class="tool-hero__ref" title="Kozar RA et al. Organ injury scaling 2018 update. J Trauma Acute Care Surg 2018;85(6):1119-1122.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary" id="badge-row"></div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="organs-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./aast-multi.js"></script>
</body>
</html>
