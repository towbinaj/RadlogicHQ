<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BI-RADS Calculator | RadioLogicHQ</title>
  <meta name="description" content="ACR BI-RADS breast imaging classification with management recommendations and structured report output.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo">RadioLogicHQ</a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">BI-RADS</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>BI-RADS</h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Category</span>
          <span class="summary-badge__value" id="badge-category" data-level="0">--</span>
        </div>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text to auto-fill..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./birads.js"></script>
</body>
</html>
