<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deauville Score | RadioLogicHQ</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Deauville 5-point scale — PET/CT response assessment for FDG-avid lymphoma with structured report output.">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-header__logo"><img src="/brand/wordmark-white.png" alt="RadioLogic HQ" class="site-header__wordmark"></a>
      <nav class="site-header__nav">
        <a href="/">All Tools</a>
        <auth-ui></auth-ui>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb"><a href="/">All Tools</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__current">Deauville Score</span></nav>

    <div class="tool-hero">
      <div class="tool-hero__text">
        <h1>Deauville <a href="https://doi.org/10.1200/JCO.2014.57.1885" target="_blank" rel="noopener" class="tool-hero__ref" title="Barrington SF et al. Role of Imaging in the Staging and Response Assessment of Lymphoma. J Clin Oncol 2014;32(27):3048-3058.">Ref</a></h1>
      </div>
      <div class="tool-hero__summary">
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Score</span>
          <span class="summary-badge__value" id="deauville-score" data-level="0">--</span>
        </div>
        <div class="summary-badge summary-badge--level">
          <span class="summary-badge__label">Response</span>
          <span class="summary-badge__value" id="deauville-response" data-level="0">--</span>
        </div>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-layout__input">
        <div id="step-container"></div>
        <div class="study-findings card">
          <label for="additional-findings">Additional Findings</label>
          <textarea id="additional-findings" rows="2"></textarea>
        </div>
      </div>
      <div class="tool-layout__output">
        <report-output></report-output>
        <div class="parse-panel card">
          <label for="parse-input">Paste Findings</label>
          <textarea id="parse-input" rows="3" placeholder="Paste report text or PowerScribe XML..."></textarea>
          <div class="parse-panel__actions">
            <button class="btn btn--primary parse-panel__btn" id="parse-btn">Parse</button>
            <span class="parse-panel__status" id="parse-status"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./deauville.js"></script>
</body>
</html>
